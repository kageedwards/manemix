server {
    listen 8644;
    server_name localhost;

    root /usr/share/spa;
    index index.html;

    error_page 500 502 503 504 /static/502.html;

    # SPA fallback: all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Axum backend
    location /api/v1/ {
        proxy_intercept_errors on;
        proxy_pass http://manemix:8100/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Atom feeds
    location ~ ^/tracks/(latest|featured)/atom$ {
        proxy_intercept_errors on;
        proxy_pass http://manemix:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy API routes (proxied for backward compatibility)
    location ~ ^/(track|tracks|user|users|artists|playlist|login|logout|register|account|me|oembed)(/|$) {
        proxy_intercept_errors on;
        proxy_pass http://manemix:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets from legacy
    location /static/ {
        alias /usr/share/manemix/static/;
    }

    # File downloads via X-Accel-Redirect
    location /downloads/art/ {
        internal;
        alias /var/lib/manemix/art/;
    }

    location /downloads/tracks/ {
        internal;
        alias /var/lib/manemix/tracks/;
    }
}
