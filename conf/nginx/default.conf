server {
    listen 8642;
    server_name localhost;

    client_max_body_size 100m;
    client_body_buffer_size 16m;

    error_page 500 502 503 504 /static/502.html;

    # Proxy to the Rust axum server (HTTP, not FastCGI)
    location / {
        proxy_intercept_errors on;
        proxy_pass http://manemix:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets served directly by nginx
    location /static/ {
        alias /usr/share/manemix/static/;
    }

    # Internal redirects for file downloads (X-Accel-Redirect)
    location /downloads/art/ {
        internal;
        alias /var/lib/manemix/art/;
    }

    location /downloads/tracks/ {
        internal;
        alias /var/lib/manemix/tracks/;
    }

    location /robots.txt {
        alias /usr/share/manemix/static/robots.txt;
    }
}
