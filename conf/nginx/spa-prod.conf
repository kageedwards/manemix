# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100m;
    client_body_buffer_size 16m;

    root /usr/share/spa;
    index index.html;

    error_page 500 502 503 504 /static/502.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API v1 requests to Axum
    location /api/v1/ {
        proxy_intercept_errors on;
        proxy_pass http://manemix:8100/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy API routes (proxied for backward compatibility)
    location ~ ^/(track|tracks|user|users|artists|playlist|login|logout|register|account|me|oembed)(/|$) {
        proxy_intercept_errors on;
        proxy_pass http://manemix:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /usr/share/manemix/static/;
    }

    location /downloads/art/ {
        internal;
        alias /var/lib/manemix/art/;
    }

    location /downloads/tracks/ {
        internal;
        alias /var/lib/manemix/tracks/;
    }

    location /robots.txt {
        alias /usr/share/manemix/static/robots.txt;
    }
}
