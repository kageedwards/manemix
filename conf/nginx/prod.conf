# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name ${DOMAIN};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100m;
    client_body_buffer_size 16m;

    error_page 500 502 503 504 /static/502.html;

    # Proxy to the Rust axum server
    location / {
        proxy_intercept_errors on;
        proxy_pass http://manemix:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets served directly by nginx
    location /static/ {
        alias /usr/share/manemix/static/;
    }

    # Internal redirects for file downloads (X-Accel-Redirect)
    location /downloads/art/ {
        internal;
        alias /var/lib/manemix/art/;
    }

    location /downloads/tracks/ {
        internal;
        alias /var/lib/manemix/tracks/;
    }

    location /robots.txt {
        alias /usr/share/manemix/static/robots.txt;
    }
}
