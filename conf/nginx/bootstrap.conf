# Temporary HTTP-only config for initial certificate issuance
server {
    listen 80;
    server_name ${DOMAIN};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else returns 503 during bootstrap
    location / {
        return 503 "Service starting — obtaining SSL certificate.\n";
        add_header Content-Type text/plain;
    }
}
