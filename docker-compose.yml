services:
  manemix:
    build: .
    environment:
      - MANEMIX_POSTGRES=postgres://postgres@db/manemix
      - MANEMIX_REDIS=redis://redis/
      - MANEMIX_DIR=/var/lib/manemix
      - MANEMIX_URL=http://localhost:8642
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/ || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - manemix-data:/var/lib/manemix

  web:
    image: nginx:latest
    depends_on:
      manemix:
        condition: service_healthy
    volumes:
      - ./conf/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static/:/usr/share/manemix/static/:ro
      - manemix-data:/var/lib/manemix:ro
    ports:
      - "8642:8642"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: manemix
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql:/sql:ro

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  manemix-data:
  pgdata:
