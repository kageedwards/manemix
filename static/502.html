<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Be Right Back — Manehattan Mix</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1625;
      color: #e0d8ec;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .card {
      background: #221d30;
      border-radius: 1rem;
      padding: 3rem 2.5rem;
      max-width: 28rem;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 {
      font-size: 1.5rem;
      color: #9b7abf;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #b0a8c0;
      margin-bottom: 1.25rem;
    }
    .retry-btn {
      display: inline-block;
      background: #9b7abf;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.6rem 1.5rem;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: #7c5fa8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">🎵</div>
    <h1>Be Right Back</h1>
    <p>We're updating something behind the scenes, or the server hit a snag. It shouldn't take long.</p>
    <a href="/" class="retry-btn">Try Again</a>
  </div>
</body>
</html>
